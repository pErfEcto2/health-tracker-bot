<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackHub</title>
    <script src="/static/js/vendor/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <div id="page-home" class="page active"></div>
        <div id="page-food" class="page"></div>
        <div id="page-workout" class="page"></div>
        <div id="page-profile" class="page"></div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-page="home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Главная</span>
        </button>
        <button class="nav-btn" data-page="food">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
            <span>Питание</span>
        </button>
        <button class="nav-btn" data-page="workout">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M4 10V4h2v16H4v-6"/><path d="M20 10V4h-2v16h2v-6"/><rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/></svg>
            <span>Тренировки</span>
        </button>
        <button class="nav-btn" data-page="profile">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </button>
    </nav>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button id="modal-close" class="modal-close-btn">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="/static/js/vendor/chart.umd.min.js"></script>
    <script src="/static/js/telegram.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/pages/home.js"></script>
    <script src="/static/js/pages/food.js"></script>
    <script src="/static/js/pages/workout.js"></script>
    <script src="/static/js/pages/profile.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
